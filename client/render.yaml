# Peeman-Real-Estate-Frontend/render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Place this file at the ROOT of your frontend repo (same level as package.json)
#
# If a render.yaml already exists in your repo, do NOT replace it entirely —
# just add the `routes` block shown below into the existing static site service.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: peeman-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html